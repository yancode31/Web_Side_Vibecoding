<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon SPA Game YANDIRA</title>
    <script>
      tailwind = {
        config: {
          darkMode: 'class',
          theme: {
            extend: {
              boxShadow: {
                glow: '0 0 0 1px rgb(59 130 246 / 0.35), 0 14px 30px -16px rgb(59 130 246 / 0.55)'
              },
              animation: {
                fadeIn: 'fadeIn 220ms ease-out',
                pulseSoft: 'pulseSoft 1.2s ease-in-out infinite'
              },
              keyframes: {
                fadeIn: {
                  '0%': { opacity: 0, transform: 'translateY(8px)' },
                  '100%': { opacity: 1, transform: 'translateY(0)' }
                },
                pulseSoft: {
                  '0%, 100%': { opacity: 1 },
                  '50%': { opacity: 0.6 }
                }
              }
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800 transition-colors dark:bg-slate-950 dark:text-slate-100">
    <h1>HOLA, MUNDO</h1>   
    <h1>prueba azure</h1>
    <div id="app"></div>
         
    <script type="module" src="./app.js"></script>
  </body>
</html>
